name: Daily AI Trends Update

on:
  workflow_dispatch: # Taaki aap jab chahein manually run kar sakein
  schedule:
    - cron: '0 5 * * *' # Yeh daily subah 10:00 AM Pakistan ke mutabiq khud chalega

permissions:
  contents: write # Website update push karne ke liye zaroori permission

jobs:
  update-website:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout karna
        uses: actions/checkout@v4

      - name: Python setup karna
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Dependencies install karna
        run: |
          pip install google-generativeai

      - name: Automation Script chalana
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python automation.py

      - name: Updated Website ko GitHub par push karna
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Daily AI Update" && git push)
