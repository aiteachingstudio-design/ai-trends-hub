name: Daily AI Trends Update

on:
  workflow_dispatch: # Manually chalane ke liye
  schedule:
    - cron: '0 0 * * *' # Daily raat 12:00 UTC (Pakistan ke mutabiq subah 5:00 baje) khud chalega

permissions:
  contents: write # GitHub ko code push karne ki permission dena

jobs:
  update-website:
    runs-on: ubuntu-latest

    steps:
      - name: Repository ka code check out karna
        uses: actions/checkout@v4

      - name: Python install karna
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Zaroori Libraries install karna
        run: |
          pip install google-generativeai

      - name: Python Script ko chalana
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python automation.py

      - name: Badlao ko GitHub par save (Commit) karna
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Daily Update" && git push)
