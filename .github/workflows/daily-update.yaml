name: Daily AI Trends Update

on:
  workflow_dispatch: # Manually run karne ke liye
  schedule:
    - cron: '0 5 * * *' # Pakistan ke mutabiq daily subah 10:00 baje chalega

permissions:
  contents: write # Code push karne ki permission

jobs:
  update-website:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout karna
        uses: actions/checkout@v4

      - name: Python setup karna
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Naye packages ke liye Python 3.11 behtar hy

      - name: Latest Gemini Library install karna
        run: |
          pip install google-generativeai

      - name: Automation Script chalana
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python automation.py

      - name: Updated Website ko GitHub par push karna
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Daily AI Update" && git push)
